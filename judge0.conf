################################################################################
# Judge0 CE configuration
# Full reference: https://github.com/judge0/judge0/blob/master/judge0.conf
################################################################################

# PostgreSQL (Judge0's own internal database)
POSTGRES_HOST=judge0-db
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0password

# Redis
REDIS_HOST=judge0-redis
REDIS_PASSWORD=

# Execution limits
CPU_TIME_LIMIT=5
MEMORY_LIMIT=262144

# Authentication (set AUTHN_HEADER and AUTHN_TOKEN to require X-Auth-Token)
# AUTHN_HEADER=X-Auth-Token
# AUTHN_TOKEN=your_secret_token_here
